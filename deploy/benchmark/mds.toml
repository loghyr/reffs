# MDS config for EC benchmark — 6 data servers.

[server]
port            = 2049
bind            = "*"
role            = "mds"
minor_versions  = [1, 2]
grace_period    = 5
workers         = 4
log_level       = "info"
layout_width    = 6

[backend]
type            = "posix"
path            = "/tmp/reffs_mds_data"
state_file      = "/tmp/reffs_mds_state"

[[export]]
path        = "/"
clients     = "*"
access      = "rw"
root_squash = false
flavors     = ["sys"]

[[data_server]]
id      = 1
address = "reffs-ds0"
path    = "/"

[[data_server]]
id      = 2
address = "reffs-ds1"
path    = "/"

[[data_server]]
id      = 3
address = "reffs-ds2"
path    = "/"

[[data_server]]
id      = 4
address = "reffs-ds3"
path    = "/"

[[data_server]]
id      = 5
address = "reffs-ds4"
path    = "/"

[[data_server]]
id      = 6
address = "reffs-ds5"
path    = "/"
