#
# EC Benchmark: 1 MDS + 6 DSes + 1 client on a Docker bridge network.
#
# A builder container compiles once into a shared volume.
# All other containers mount that volume read-only and just run
# the pre-built binaries.
#
# Usage:
#   make -f Makefile.reffs run-benchmark

x-ds-common: &ds-common
  image: reffs-dev
  privileged: true
  ulimits:
    nofile:
      soft: 65536
      hard: 65536
  volumes:
    - build-vol:/shared:ro
  healthcheck:
    test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/2049' 2>/dev/null"]
    interval: 5s
    timeout: 3s
    retries: 120
    start_period: 5s
  command: >
    /bin/bash -c "
      while [ ! -f /shared/ready ]; do sleep 1; done &&
      rm -rf /tmp/reffs_ds_data /tmp/reffs_ds_state &&
      mkdir -p /tmp/reffs_ds_data/sb_1 /tmp/reffs_ds_state &&
      exec /shared/build/src/reffsd --config=/shared/src/deploy/benchmark/ds.toml
    "

services:
  builder:
    container_name: reffs-bench-builder
    image: reffs-dev
    volumes:
      - ../../:/reffs:ro,z
      - build-vol:/shared
    command: >
      /bin/bash -c "
        rsync -a --exclude='.git' --exclude='build' --exclude='logs' /reffs/ /shared/src/ &&
        find /shared/src -name 'parsetab.py' -delete &&
        cd /shared/src && mkdir -p m4 && autoreconf -fi &&
        mkdir -p /shared/build && cd /shared/build &&
        /shared/src/configure &&
        find /shared -name 'parsetab.py' -delete &&
        make -j1 &&
        echo 'SIMD build done; starting noscalar-vec build for experiment 03...' &&
        mkdir -p /shared/build-noscalar-vec && cd /shared/build-noscalar-vec &&
        /shared/src/configure --enable-noscalar-vec &&
        make -j1 &&
        touch /shared/ready &&
        echo 'Both builds done.'
      "

  ds0:
    <<: *ds-common
    container_name: reffs-bench-ds0
    depends_on:
      builder:
        condition: service_completed_successfully
    networks:
      bench:
        aliases: [reffs-ds0]

  ds1:
    <<: *ds-common
    container_name: reffs-bench-ds1
    depends_on:
      builder:
        condition: service_completed_successfully
    networks:
      bench:
        aliases: [reffs-ds1]

  ds2:
    <<: *ds-common
    container_name: reffs-bench-ds2
    depends_on:
      builder:
        condition: service_completed_successfully
    networks:
      bench:
        aliases: [reffs-ds2]

  ds3:
    <<: *ds-common
    container_name: reffs-bench-ds3
    depends_on:
      builder:
        condition: service_completed_successfully
    networks:
      bench:
        aliases: [reffs-ds3]

  ds4:
    <<: *ds-common
    container_name: reffs-bench-ds4
    depends_on:
      builder:
        condition: service_completed_successfully
    networks:
      bench:
        aliases: [reffs-ds4]

  ds5:
    <<: *ds-common
    container_name: reffs-bench-ds5
    depends_on:
      builder:
        condition: service_completed_successfully
    networks:
      bench:
        aliases: [reffs-ds5]

  ds6:
    <<: *ds-common
    container_name: reffs-bench-ds6
    depends_on:
      builder:
        condition: service_completed_successfully
    networks:
      bench:
        aliases: [reffs-ds6]

  ds7:
    <<: *ds-common
    container_name: reffs-bench-ds7
    depends_on:
      builder:
        condition: service_completed_successfully
    networks:
      bench:
        aliases: [reffs-ds7]

  ds8:
    <<: *ds-common
    container_name: reffs-bench-ds8
    depends_on:
      builder:
        condition: service_completed_successfully
    networks:
      bench:
        aliases: [reffs-ds8]

  ds9:
    <<: *ds-common
    container_name: reffs-bench-ds9
    depends_on:
      builder:
        condition: service_completed_successfully
    networks:
      bench:
        aliases: [reffs-ds9]

  mds:
    container_name: reffs-bench-mds
    image: reffs-dev
    privileged: true
    depends_on:
      ds0:
        condition: service_healthy
      ds1:
        condition: service_healthy
      ds2:
        condition: service_healthy
      ds3:
        condition: service_healthy
      ds4:
        condition: service_healthy
      ds5:
        condition: service_healthy
      ds6:
        condition: service_healthy
      ds7:
        condition: service_healthy
      ds8:
        condition: service_healthy
      ds9:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      bench:
        aliases: [reffs-mds]
    ports:
      - "2049:2049"
      - "2049:2049/udp"
    volumes:
      - build-vol:/shared:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/2049' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 120
      start_period: 5s
    command: >
      /bin/bash -c "
        rm -rf /tmp/reffs_mds_data /tmp/reffs_mds_state &&
        mkdir -p /tmp/reffs_mds_data /tmp/reffs_mds_state &&
        exec /shared/build/src/reffsd --config=/shared/src/deploy/benchmark/mds.toml
      "

  bench:
    container_name: reffs-bench-client
    image: reffs-dev
    privileged: true
    depends_on:
      mds:
        condition: service_healthy
    networks:
      - bench
    volumes:
      - build-vol:/shared:ro
      - ../../:/reffs:ro,z
    command: >
      /bin/bash -c "
        exec /reffs/scripts/ec_benchmark_full.sh /shared/build/tools/ec_demo reffs-mds
      "
    profiles:
      - run

  # experiment 03 -- larger-shard SIMD-vs-scalar matrix.
  # Uses both /shared/build (SIMD) and /shared/build-noscalar-vec
  # (scalar-honest, no-vec compile flags on the codec sources).
  # See reffs-docs/experiments/03-larger-shards.md.
  bench-shards:
    container_name: reffs-bench-shards
    image: reffs-dev
    privileged: true
    depends_on:
      mds:
        condition: service_healthy
    networks:
      - bench
    volumes:
      - build-vol:/shared:ro
      - ../../:/reffs:ro,z
    command: >
      /bin/bash -c "
        exec /reffs/scripts/ec_benchmark_shards.sh
          --simd-binary   /shared/build/tools/ec_demo
          --scalar-binary /shared/build-noscalar-vec/tools/ec_demo
          --mds reffs-mds
          --layout v1
      "
    profiles:
      - shards

volumes:
  build-vol:

networks:
  bench:
    driver: bridge
