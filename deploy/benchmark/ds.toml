#
# DS config for EC benchmark — shared across all 6 DSes.
# Each DS instance creates its own data/state dirs.

[server]
port            = 2049
bind            = "*"
role            = "ds"
minor_versions  = [1, 2]
grace_period    = 5
workers         = 4
log_level       = "info"

[backend]
type            = "posix"
path            = "/tmp/reffs_ds_data"
state_file      = "/tmp/reffs_ds_state"

[[export]]
path        = "/"

    [[export.clients]]
    match       = "*"
    access      = "rw"
    root_squash = false
    flavors     = ["sys"]
