#
# Combined MDS+DS on a single instance.
# The 127.0.0.1 dstore uses the local VFS vtable — no loopback RPC.

[server]
port            = 2049
bind            = "*"
role            = "combined"
minor_versions  = [1, 2]
grace_period    = 5
workers         = 4
log_level       = "info"

[backend]
type            = "posix"
path            = "/tmp/reffs_combined_data"
state_file      = "/tmp/reffs_combined_state"
ds_path         = "/tmp/reffs_combined_ds"

[[export]]
path        = "/"

    [[export.clients]]
    match       = "*"
    access      = "rw"
    root_squash = false
    flavors     = ["sys"]

[[data_server]]
id      = 1
address = "127.0.0.1"
path    = "/"
