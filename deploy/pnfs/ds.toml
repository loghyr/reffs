#
# pNFS DS configuration for container deployment.

[server]
port            = 2049
bind            = "*"
role            = "ds"
minor_versions  = [1, 2]
grace_period    = 5
workers         = 4
log_level       = "info"

[backend]
type            = "posix"
path            = "/tmp/reffs_ds_data"
state_file      = "/tmp/reffs_ds_state"

[[export]]
path        = "/ds1"
clients     = "*"
access      = "rw"
root_squash = false
flavors     = ["sys"]
