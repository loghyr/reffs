#
# Multi-codec sanity test: 1 MDS + 6 DSes + 2 PSes + 1 client on a
# Docker bridge.
#
# A builder container compiles once into a shared volume.  All other
# containers mount that volume read-only and run pre-built binaries.
#
# Two profiles:
#   default ('run-sanity' make target): client tests SBs directly against
#     MDS (no PS in the loop).  4/5 SBs PASS on main as of 2026-04-27.
#   'ps-demo' ('run-ps-demo'): client mounts both PSes, writes via PS-A,
#     reads from PS-B, byte-exact diff.  Exercises the existing ps_proxy_*
#     forward path against AUTH_SYS clients.
#
# Usage:
#   make -f Makefile.reffs run-sanity      (no PS)
#   make -f Makefile.reffs run-ps-demo     (with 2 PSes)

x-ds-common: &ds-common
  image: reffs-dev
  privileged: true
  ulimits:
    nofile:
      soft: 65536
      hard: 65536
  volumes:
    - sanity-build-vol:/shared:ro
  healthcheck:
    test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/2049' 2>/dev/null"]
    interval: 5s
    timeout: 3s
    retries: 120
    start_period: 5s
  command: >
    /bin/bash -c "
      while [ ! -f /shared/ready ]; do sleep 1; done &&
      rm -rf /tmp/reffs_ds_data /tmp/reffs_ds_state &&
      mkdir -p /tmp/reffs_ds_data/sb_1 /tmp/reffs_ds_state &&
      exec /shared/build/src/reffsd --config=/shared/src/deploy/sanity/ds.toml
    "

services:
  builder:
    container_name: reffs-sanity-builder
    image: reffs-dev
    volumes:
      - ../../:/reffs:ro,z
      - sanity-build-vol:/shared
    command: >
      /bin/bash -c "
        rsync -a --exclude='.git' --exclude='build' --exclude='logs' /reffs/ /shared/src/ &&
        find /shared/src -name 'parsetab.py' -delete &&
        cd /shared/src && mkdir -p m4 && autoreconf -fi &&
        mkdir -p /shared/build && cd /shared/build &&
        /shared/src/configure &&
        find /shared -name 'parsetab.py' -delete &&
        make -j1 &&
        touch /shared/ready &&
        echo 'Builder done.'
      "

  ds0:
    <<: *ds-common
    container_name: reffs-sanity-ds0
    depends_on:
      builder:
        condition: service_completed_successfully
    networks:
      sanity:
        aliases: [reffs-ds0]

  ds1:
    <<: *ds-common
    container_name: reffs-sanity-ds1
    depends_on:
      builder:
        condition: service_completed_successfully
    networks:
      sanity:
        aliases: [reffs-ds1]

  ds2:
    <<: *ds-common
    container_name: reffs-sanity-ds2
    depends_on:
      builder:
        condition: service_completed_successfully
    networks:
      sanity:
        aliases: [reffs-ds2]

  ds3:
    <<: *ds-common
    container_name: reffs-sanity-ds3
    depends_on:
      builder:
        condition: service_completed_successfully
    networks:
      sanity:
        aliases: [reffs-ds3]

  ds4:
    <<: *ds-common
    container_name: reffs-sanity-ds4
    depends_on:
      builder:
        condition: service_completed_successfully
    networks:
      sanity:
        aliases: [reffs-ds4]

  ds5:
    <<: *ds-common
    container_name: reffs-sanity-ds5
    depends_on:
      builder:
        condition: service_completed_successfully
    networks:
      sanity:
        aliases: [reffs-ds5]

  mds:
    container_name: reffs-sanity-mds
    image: reffs-dev
    privileged: true
    depends_on:
      ds0: { condition: service_healthy }
      ds1: { condition: service_healthy }
      ds2: { condition: service_healthy }
      ds3: { condition: service_healthy }
      ds4: { condition: service_healthy }
      ds5: { condition: service_healthy }
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      sanity:
        aliases: [reffs-mds]
    volumes:
      - sanity-build-vol:/shared:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/2049' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 120
      start_period: 5s
    command: >
      /bin/bash -c "
        rm -rf /tmp/reffs_mds_data /tmp/reffs_mds_state &&
        mkdir -p /tmp/reffs_mds_data /tmp/reffs_mds_state &&
        exec /shared/build/src/reffsd --config=/shared/src/deploy/sanity/mds.toml
      "

  sanity:
    container_name: reffs-sanity-client
    image: reffs-dev
    privileged: true
    depends_on:
      mds:
        condition: service_healthy
    networks:
      - sanity
    volumes:
      - sanity-build-vol:/shared:ro
      - ../../:/reffs:ro,z
    command: >
      /bin/bash -c "
        /reffs/deploy/sanity/setup-sbs.sh reffs-mds &&
        /reffs/deploy/sanity/run-sanity.sh /shared/build/tools/ec_demo reffs-mds
      "
    profiles:
      - run

  mds-setup:
    container_name: reffs-sanity-mds-setup
    image: reffs-dev
    depends_on:
      mds:
        condition: service_healthy
    networks:
      - sanity
    volumes:
      - sanity-build-vol:/shared:ro
      - ../../:/reffs:ro,z
    # Oneshot: create the 5 sanity SBs on the MDS, then exit.  The
    # PSes depend on completion so that when they start, the MDS
    # already advertises every SB they need to discover via MOUNT.
    command: >
      /bin/bash -c "
        /reffs/deploy/sanity/setup-sbs.sh reffs-mds
      "
    profiles:
      - ps-demo

  ps-a:
    image: reffs-dev
    container_name: reffs-sanity-ps-a
    privileged: true
    depends_on:
      mds-setup:
        condition: service_completed_successfully
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - sanity-build-vol:/shared:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/2049' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 5s
    networks:
      sanity:
        aliases: [reffs-ps-a]
    command: >
      /bin/bash -c "
        rm -rf /tmp/reffs_ps_data /tmp/reffs_ps_state &&
        mkdir -p /tmp/reffs_ps_data/sb_1 /tmp/reffs_ps_state &&
        exec /shared/build/src/reffsd --config=/shared/src/deploy/sanity/ps.toml
      "
    profiles:
      - ps-demo

  ps-b:
    image: reffs-dev
    container_name: reffs-sanity-ps-b
    privileged: true
    depends_on:
      mds-setup:
        condition: service_completed_successfully
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - sanity-build-vol:/shared:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/2049' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 5s
    networks:
      sanity:
        aliases: [reffs-ps-b]
    command: >
      /bin/bash -c "
        rm -rf /tmp/reffs_ps_data /tmp/reffs_ps_state &&
        mkdir -p /tmp/reffs_ps_data/sb_1 /tmp/reffs_ps_state &&
        exec /shared/build/src/reffsd --config=/shared/src/deploy/sanity/ps.toml
      "
    profiles:
      - ps-demo

  ps-demo:
    container_name: reffs-sanity-ps-client
    image: reffs-dev
    privileged: true
    depends_on:
      ps-a:
        condition: service_healthy
      ps-b:
        condition: service_healthy
    networks:
      - sanity
    volumes:
      - sanity-build-vol:/shared:ro
      - ../../:/reffs:ro,z
    # SBs already provisioned by mds-setup before ps-a/ps-b started.
    command: >
      /bin/bash -c "
        /reffs/deploy/sanity/run-ps-demo.sh /shared/build/tools/ec_demo reffs-ps-a reffs-ps-b
      "
    profiles:
      - ps-demo

volumes:
  sanity-build-vol:

networks:
  sanity:
    driver: bridge
