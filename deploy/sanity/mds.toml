#
# MDS config for the multi-codec sanity test (deploy/sanity).
# 1 MDS + 6 DSes.  SBs are NOT created here -- per
# .claude/design/sb-registry-v3.md ([[export]] is root-only since
# the registry-v3 work).  Slice setup-sbs.sh creates the 5 sanity
# SBs (/ffv1-csm, /ffv1-stripes, /ffv2-csm, /ffv2-rs, /ffv2-mj) via
# the probe protocol after the MDS is up, then sb-set-dstores binds
# all 6 DSes to each of them.

[server]
port            = 2049
bind            = "*"
role            = "mds"
minor_versions  = [1, 2]
grace_period    = 5
workers         = 4
log_level       = "info"
layout_width    = 6

[backend]
type            = "posix"
path            = "/tmp/reffs_mds_data"
state_file      = "/tmp/reffs_mds_state"

[[export]]
path        = "/"

    [[export.clients]]
    match       = "*"
    access      = "rw"
    root_squash = false
    flavors     = ["sys"]

[[data_server]]
id      = 1
address = "reffs-ds0"
path    = "/"

[[data_server]]
id      = 2
address = "reffs-ds1"
path    = "/"

[[data_server]]
id      = 3
address = "reffs-ds2"
path    = "/"

[[data_server]]
id      = 4
address = "reffs-ds3"
path    = "/"

[[data_server]]
id      = 5
address = "reffs-ds4"
path    = "/"

[[data_server]]
id      = 6
address = "reffs-ds5"
path    = "/"
