#
# BAT (Build Acceptance Test) server configuration.
#
# Combined pNFS MDS+DS with all security flavors.  Installed to
# /etc/reffs/reffsd.toml by the RPM.  Per-flavor sub-exports
# (/krb5, /krb5i, /krb5p, /tls) are created at runtime by
# bat_export_setup.sh via the probe protocol.
#
# See also: reffsd.toml (standalone), reffsd-mds.toml, reffsd-ds.toml

[server]
port            = 2049
bind            = "*"
role            = "combined"
minor_versions  = [1, 2]
grace_period    = 45
workers         = 8
max_session_slots = 64
log_level       = "info"
tls             = true
tls_cert        = "/etc/reffs/tls/server.pem"
tls_key         = "/etc/reffs/tls/server-key.pem"

[backend]
type            = "posix"
path            = "/var/lib/reffs/data"
state_file      = "/var/lib/reffs/state"
ds_path         = "/var/lib/reffs/ds"

[iouring]
network_sq_size = 2048
network_cq_size = 8192
backend_sq_size = 512
backend_cq_size = 2048

# Root export: all flavors so clients can traverse to per-flavor
# sub-exports without WRONGSEC at the root.  layout_types enables
# pNFS on the root namespace (ec_demo targets root via PUTROOTFH).
# dstores binds the loopback data server (id=1) to the root export.
# These are applied at startup because the root export is not saved
# in the sb registry (it is always recreated by ns_init).
[[export]]
path         = "/"
layout_types = ["ffv1"]
dstores      = [1]

    [[export.clients]]
    match       = "*"
    access      = "rw"
    root_squash = false
    flavors     = ["sys", "krb5", "krb5i", "krb5p", "tls"]

# Loopback data server for combined pNFS mode.
# Data server for combined pNFS mode.
# bat_setup.sh replaces REPLACE_WITH_SERVER_IP with the server's
# real IP/hostname.  Remote clients receive this address in
# LAYOUTGET and connect to it for DS I/O.  Using 127.0.0.1 would
# cause remote clients to connect to themselves.
[[data_server]]
id      = 1
address = "REPLACE_WITH_SERVER_IP"
path    = "/"

# Remote DS for file layouts (separate machine, role = "ds").
# bat_setup.sh replaces REPLACE_WITH_DS_IP.  Comment out if no
# file layout DS is configured.
# [[data_server]]
# id       = 2
# address  = "REPLACE_WITH_DS_IP"
# path     = "/"
# protocol = "nfsv4"
