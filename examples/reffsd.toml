#
# Standalone NFS server — no pNFS, no layouts.
# See also: reffsd-mds.toml, reffsd-ds.toml

[server]
port            = 2049
bind            = "*"
role            = "standalone"
minor_versions  = [1, 2]
grace_period    = 45
workers         = 8
max_session_slots = 64
log_level       = "info"

[backend]
type            = "posix"
path            = "/var/lib/reffs/data"
state_file      = "/var/lib/reffs/reffs.state"

[iouring]
network_sq_size = 2048
network_cq_size = 8192
backend_sq_size = 512
backend_cq_size = 2048

[[export]]
path        = "/"

    [[export.clients]]
    match       = "*"
    access      = "rw"
    root_squash = false
    flavors     = ["sys"]
