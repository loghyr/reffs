#
# pNFS Flex Files data server (DS).
#
# The DS serves data files over NFSv3 to pNFS clients.  The MDS
# connects to this server at startup via MOUNT to obtain root
# filehandles, then creates data files in the export path.
#
# See also: reffsd.toml (standalone), reffsd-mds.toml (MDS)

[server]
port            = 2049
bind            = "*"
role            = "ds"
minor_versions  = [1, 2]
grace_period    = 45
workers         = 8
max_session_slots = 64
log_level       = "info"

[backend]
type            = "posix"
path            = "/var/lib/reffs/ds/data"
state_file      = "/var/lib/reffs/ds/reffs.state"

[iouring]
network_sq_size = 2048
network_cq_size = 8192
backend_sq_size = 512
backend_cq_size = 2048

[[export]]
path        = "/ds1"
clients     = "*"
access      = "rw"
root_squash = false
flavors     = ["sys"]
