#
# pNFS Flex Files metadata server (MDS).
#
# The MDS issues layouts pointing at the configured data servers.
# It connects to each data server via MOUNT at startup to obtain
# root filehandles for NFSv3 control-plane operations.
#
# See also: reffsd.toml (standalone), reffsd-ds.toml (data server)

[server]
port            = 2049
bind            = "*"
role            = "mds"
minor_versions  = [1, 2]
grace_period    = 45
workers         = 8
max_session_slots = 64
log_level       = "info"

[backend]
type            = "posix"
path            = "/var/lib/reffs/mds/data"
state_file      = "/var/lib/reffs/mds/reffs.state"

[iouring]
network_sq_size = 2048
network_cq_size = 8192
backend_sq_size = 512
backend_cq_size = 2048

[[export]]
path        = "/"

    [[export.clients]]
    match       = "*"
    access      = "rw"
    root_squash = false
    flavors     = ["sys"]

[[data_server]]
id      = 1
address = "192.168.2.105"
path    = "/ds1"

[[data_server]]
id      = 2
address = "192.168.2.106"
path    = "/ds2"

[[data_server]]
id      = 3
address = "192.168.2.107"
path    = "/ds3"

[[data_server]]
id      = 4
address = "192.168.2.108"
path    = "/ds4"
