name: C/C++ CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # Self-hosted runner on Hetzner VM — Fedora, real NFS mounts, RocksDB.
  # All deps pre-installed, no Docker.
  build-self-hosted:
    runs-on: self-hosted

    steps:
    - name: Acquire CI lock
      run: |
        LOCKFILE=/reffs_data/reffs_ci.lock
        for i in $(seq 1 60); do
          if (set -C; echo $$ > "$LOCKFILE") 2>/dev/null; then
            echo "Lock acquired"
            break
          fi
          echo "Waiting for lock (attempt $i/60)..."
          sleep 10
        done
        [ -f "$LOCKFILE" ] && [ "$(cat "$LOCKFILE")" = "$$" ] || exit 1

    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Create m4 directory
      run: mkdir -p m4

    - name: Autoreconf
      run: autoreconf -fi

    - name: Check style
      run: make -f Makefile.reffs style

    - name: Check license
      run: SKIP_STYLE=1 make -f Makefile.reffs license

    - name: Configure
      run: |
        mkdir -p build_ci
        cd build_ci
        ../configure --enable-asan --enable-ubsan

    - name: Build
      run: |
        cd build_ci
        make -j$(nproc)

    - name: Run unit tests
      run: |
        cd build_ci
        make check || (cat lib/fs/tests/test-suite.log && exit 1)

    - name: Run integration tests
      run: |
        sudo rpcbind 2>/dev/null || true
        # Integration test needs root for mount + port 2049.
        # Pass user's PATH so build-on-NFS finds xdr-parser.
        sudo -E env \
          "PATH=$HOME/.local/bin:/usr/local/bin:/usr/bin:/usr/sbin" \
          "LD_LIBRARY_PATH=/usr/local/lib:/usr/local/lib64" \
          "HOME=$HOME" \
          bash -c "ulimit -n 65536; bash scripts/ci_integration_test.sh \
            '$(pwd)/build_ci/src/reffsd' \
            '$(pwd)'"

    - name: Clean up
      if: always()
      run: |
        rm -rf build_ci
        # Integration test mount (Docker, port 2049).
        sudo fuser -k -m /mnt/reffs 2>/dev/null || true
        sleep 1
        sudo umount -f -l /mnt/reffs 2>/dev/null || true
        sudo rm -rf /mnt/reffs 2>/dev/null || true
        # Soak test mounts left by nightly_ci.sh or local_soak.sh when
        # SIGKILL bypasses EXIT traps.  Kill the stale reffsd on port
        # 12049 first so pending RPCs get ECONNREFUSED and D-state
        # processes can wake before we force-unmount.
        sudo fuser -k 12049/tcp 2>/dev/null || true
        sleep 1
        for mp in /mnt/reffs_local_soak /mnt/reffs_soak*; do
          [ -d "$mp" ] || continue
          mountpoint -q "$mp" 2>/dev/null || continue
          sudo fuser -k -m "$mp" 2>/dev/null || true
          sleep 1
          sudo umount -f -l "$mp" 2>/dev/null || true
        done
        rm -f /reffs_data/reffs_ci.lock
