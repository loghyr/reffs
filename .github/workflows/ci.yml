name: C/C++ CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # Self-hosted runner on Hetzner VM — Fedora, real NFS mounts, RocksDB.
  # All deps pre-installed, no Docker.
  build-self-hosted:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Create m4 directory
      run: mkdir -p m4

    - name: Autoreconf
      run: autoreconf -fi

    - name: Check style
      run: make -f Makefile.reffs style

    - name: Check license
      run: SKIP_STYLE=1 make -f Makefile.reffs license

    - name: Configure
      run: |
        mkdir -p build_ci
        cd build_ci
        ../configure --enable-asan --enable-ubsan

    - name: Build
      run: |
        cd build_ci
        make -j$(nproc)

    - name: Run unit tests
      run: |
        cd build_ci
        make check || (cat lib/fs/tests/test-suite.log && exit 1)

    - name: Run integration tests
      run: |
        sudo rpcbind 2>/dev/null || true
        sudo -E env "PATH=$PATH" bash -c "ulimit -n 65536; bash scripts/ci_integration_test.sh \
          '$(pwd)/build_ci/src/reffsd' \
          '$(pwd)'"

    - name: Clean build directory
      if: always()
      run: rm -rf build_ci
