name: C/C++ CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # Self-hosted runner on Hetzner VM — Fedora, real NFS mounts, RocksDB.
  # All deps pre-installed, no Docker.
  build-self-hosted:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Create m4 directory
      run: mkdir -p m4

    - name: Autoreconf
      run: autoreconf -fi

    - name: Check style
      run: make -f Makefile.reffs style

    - name: Check license
      run: SKIP_STYLE=1 make -f Makefile.reffs license

    - name: Configure
      run: |
        mkdir -p build_ci
        cd build_ci
        ../configure --enable-asan --enable-ubsan

    - name: Build
      run: |
        cd build_ci
        make -j$(nproc)

    - name: Run unit tests
      run: |
        cd build_ci
        make check || (cat lib/fs/tests/test-suite.log && exit 1)

    - name: Run integration tests
      run: |
        sudo rpcbind 2>/dev/null || true
        # Integration test needs root for mount + port 2049.
        # Pass user's PATH so build-on-NFS finds xdr-parser.
        sudo -E env \
          "PATH=$HOME/.local/bin:/usr/local/bin:/usr/bin:/usr/sbin" \
          "LD_LIBRARY_PATH=/usr/local/lib:/usr/local/lib64" \
          "HOME=$HOME" \
          bash -c "ulimit -n 65536; bash scripts/ci_integration_test.sh \
            '$(pwd)/build_ci/src/reffsd' \
            '$(pwd)'"

    - name: Clean up
      if: always()
      run: |
        rm -rf build_ci
        sudo umount -f /mnt/reffs 2>/dev/null || true
        sudo rm -rf /mnt/reffs 2>/dev/null || true
